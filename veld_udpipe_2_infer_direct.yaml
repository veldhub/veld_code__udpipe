x-veld:
  code:

services:
  veld_udpipe_2_infer_direct:
    build:
      context: .
      dockerfile: udpipe_2.dockerfile
    command: python3 udpipe2_direct.py german german-hdt-ud-2.10-220711 /veld/input/model/udpipe2-ud-2.10-220711/de_hdt-ud-2.10-220711.model/ de_hdt https://ufal.mff.cuni.cz/udpipe/2/models#universal_dependencies_210_models
    volumes:
      - ./data/inference/input/txt/:/veld/input/txt/
      - ./data/inference/input/model/:/veld/input/model/
      - ./data/inference/output/:/veld/output/
      - ./src/udpipe_2/:/veld/code/
      - ./data/cache/nv/:/root/.nv/ComputeCache
      - ./data/cache/hf/:/root/.cache/huggingface/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all        # or count: 1 for a single GPU
              capabilities: [gpu]

